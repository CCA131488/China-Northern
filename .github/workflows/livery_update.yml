name: China Northern Livery Update

on:
  push:
    paths:
      - livery.json
  workflow_dispatch:

jobs:
  discord-livery-announcement:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Install jq (JSON processor)
        run: sudo apt-get install jq

      - name: Parse livery.json and prepare message
        id: prepare_message
        run: |
          # Read livery.json content
          LIVERY_JSON=$(cat livery.json)

          # Initialize the message content
          text="# China Northern livery update\n\n"
          total=0

          # Iterate through the aircraft data in the JSON file
          for aircraft in $(echo "$LIVERY_JSON" | jq -r '.aircraft[] | @base64'); do
            _aircraft=$(echo "$aircraft" | base64 --decode)
            aircraft_name=$(echo "$_aircraft" | jq -r '.name')
            text="$text**$aircraft_name**\n"
            liveries=$(echo "$_aircraft" | jq -r '.liveries')

            # Iterate through each livery of the aircraft
            for livery in $(echo "$liveries" | jq -r '.[] | @base64'); do
              _livery=$(echo "$livery" | base64 --decode)
              livery_name=$(echo "$_livery" | jq -r '.name')
              author_name=$(echo "$_livery" | jq -r '.author')
              text="$text$livery_name *by: $author_name*\n"
              total=$((total + 1))
            done
            text="$text\n"
          done

          # Convert total to emoji representation
          emojiTotal=$(echo $total | sed 's/[0-9]/\0:/g')

          # Add Total count to message
          text="$text Total: $emojiTotal"

          # Output the prepared message
          echo "Prepared message: $text"
          echo "::set-output name=message::$text"

      - name: Send message to Discord Webhook
        env:
          WEBHOOK_URL: ${{ secrets.LIVERY_UPDATE_WEBHOOK }}
        run: |
          # Send the prepared message to Discord
          curl -X POST -H "Content-Type: application/json" -d '{"content": "'"${{ steps.prepare_message.outputs.message }}"'"}' $WEBHOOK_URL

      - name: Commit the new commit.txt
        id: get_commit
        uses: pr-mpt/actions-commit-hash@v2

      - name: Write commit hash to commit.txt
        uses: 1arp/create-a-file-action@0.4.5
        with:
          path: '.' 
          isAbsolutePath: false
          file: '.webhook/commit.txt'
          content: |
            ${{ steps.get_commit.outputs.hash }}

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git pull
          git config user.name "github-actions"
          git add .webhook/commit.txt
          git commit -m "Update commit.txt with latest commit hash"
          git push
