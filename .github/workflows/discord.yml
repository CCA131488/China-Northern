name: GitHub Updates to Discord

on:
  push:
    branches:
      - main  # 选择你想监听的分支
  pull_request:
    types: [opened, closed, reopened]
  release:
    types: [published, created]

jobs:
  send-discord-message:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Discord channel
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
            COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
            MESSAGE="**New commit pushed:** ${COMMIT_MESSAGE} by ${COMMIT_AUTHOR}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_ACTION="${{ github.event.action }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_USER="${{ github.event.pull_request.user.login }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            MESSAGE="**Pull request ${PR_ACTION}:** ${PR_TITLE} by ${PR_USER}\n${PR_URL}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            RELEASE_NAME="${{ github.event.release.name }}"
            RELEASE_URL="${{ github.event.release.html_url }}"
            MESSAGE="**New release published:** ${RELEASE_NAME}\n${RELEASE_URL}"
          fi
          
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"${MESSAGE}\"}" \
          https://discord.com/api/webhooks/1482311220240449629/DFLQeK2XNAtvP_e7KWoPnNRi7_yw4MzvJQIY2SpPGJS9iYwS-o2rcDEFKA_T-pvTSpPx
